# ──────────────────────────────────────────────────────────────────────
#  Prometheus Configuration
#  Scrapes the Wine Quality API /metrics endpoint
# ──────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Load alert rules
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # ── Prometheus self-monitoring ────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ── Wine Quality API ─────────────────────────────────────────────
  - job_name: "wine-quality-api"
    scrape_interval: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["wine-quality-api:5000"]
        labels:
          service: "wine-quality-api"
          environment: "production"
