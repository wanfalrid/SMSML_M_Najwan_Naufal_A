# ──────────────────────────────────────────────────────────────────────
#  CI/CD Pipeline — Wine Quality MLOps
#  GitHub Actions Workflow
# ──────────────────────────────────────────────────────────────────────

name: Wine Quality MLOps CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE_NAME: wine-quality-api

jobs:
  # ────────────────────────────────────────────────────────────────────
  #  Job 1: Lint & Code Quality
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 Eksperimen_SML_M_Najwan_Naufal_A/ --max-line-length=120 --ignore=E501,W503,E203 --count --show-source
          flake8 Membangun_model/ --max-line-length=120 --ignore=E501,W503,E203 --count --show-source

      - name: Check formatting with black
        run: |
          black --check --line-length=120 Eksperimen_SML_M_Najwan_Naufal_A/ || true
          black --check --line-length=120 Membangun_model/ || true

  # ────────────────────────────────────────────────────────────────────
  #  Job 2: Test
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Membangun_model/requirements.txt

      - name: Run API tests
        working-directory: Membangun_model
        run: |
          python -m pytest test_api.py -v --tb=short

  # ────────────────────────────────────────────────────────────────────
  #  Job 3: Build & Push Docker Image
  # ────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Membangun_model
          file: ./Membangun_model/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  #  Job 4: Train Pipeline (manual trigger)
  # ────────────────────────────────────────────────────────────────────
  train:
    name: Run Training Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[train]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Eksperimen_SML_M_Najwan_Naufal_A/requirements.txt

      - name: Download dataset
        working-directory: Eksperimen_SML_M_Najwan_Naufal_A
        run: python download_data.py

      - name: Run training pipeline
        working-directory: Eksperimen_SML_M_Najwan_Naufal_A
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python modular_pipeline.py --dagshub-repo ${{ secrets.DAGSHUB_REPO }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: Eksperimen_SML_M_Najwan_Naufal_A/output/best_model/
          retention-days: 30
