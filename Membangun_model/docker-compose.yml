# ──────────────────────────────────────────────────────────────────────
#  Docker Compose — Wine Quality Model Serving
# ──────────────────────────────────────────────────────────────────────

services:
  wine-quality-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wine-quality-api
    ports:
      - "5000:5000"
    environment:
      - MODEL_DIR=/app/model
      - PORT=5000
    volumes:
      - ./model:/app/model:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
